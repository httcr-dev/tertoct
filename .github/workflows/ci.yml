name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      FIRESTORE_EMULATOR_HOST: 127.0.0.1:8080
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm i -g firebase-tools

      - name: Start Firestore Emulator
        run: |
          firebase emulators:start --only firestore --project tertoct-ci --host 127.0.0.1 --port 8080 > /tmp/firestore-emulator.log 2>&1 &
          for i in {1..30}; do
            if nc -z 127.0.0.1 8080; then
              echo "Firestore emulator ready"
              exit 0
            fi
            sleep 1
          done
          echo "Firestore emulator failed to start"
          cat /tmp/firestore-emulator.log
          exit 1

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm run test

      - name: Build
        run: npm run build
